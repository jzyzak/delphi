# DELPHI pre-commit hooks (CLAUDE.md §7): ruff (lint+format), pyright (types),
# secret scanning, and the adversarial boundary check.
#
# Install once:  uv run pre-commit install
# Run on all:    uv run pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        pass_filenames: false
        types: [python]

      - id: harness-boundary
        name: harness adversarial boundary check
        entry: uv run python -m harness.gates
        language: system
        pass_filenames: false
        files: ^(research|harness)/.*\.py$
